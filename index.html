<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanaco Working Force</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button id="langToggle" class="lang-toggle" type="button" aria-label="Switch language">🇬🇧</button>
    <section id="authGate" class="auth-shell">
      <article class="auth-card">
        <h1 data-i18n="app.title">Vanaco Working Force</h1>
        <p data-i18n="auth.subtitle">Acceso por usuario y contraseña</p>
        <form id="loginForm" class="auth-form">
          <label class="field">
            <span data-i18n="auth.username">Usuario</span>
            <input id="usernameInput" type="text" required placeholder="admin" data-i18n-placeholder="auth.username_placeholder" />
          </label>
          <label class="field">
            <span data-i18n="auth.password">Contraseña</span>
            <input id="passwordInput" type="password" required placeholder="********" data-i18n-placeholder="auth.password_placeholder" />
          </label>
          <div class="auth-actions">
            <button class="btn btn-primary" type="submit" data-i18n="auth.login">Entrar</button>
            <button id="registerBtn" class="btn" type="button" data-i18n="auth.register">Registrarse</button>
          </div>
          <p id="authMessage" class="auth-message"></p>
          <p id="appVersion" class="auth-version"></p>
        </form>
      </article>
    </section>

    <div id="appShell" class="hidden">
      <header class="hero">
        <div class="welcome">
          <p class="welcome-label" data-i18n="app.welcome">Bienvenido</p>
          <h1 id="userBadge" class="welcome-name"></h1>
          <p id="roleSummary" class="welcome-role"></p>
        </div>
        <div class="hero-actions">
          <button id="logoutBtn" class="btn" data-i18n="auth.logout">Cerrar sesión</button>
        </div>
      </header>

      <section id="menuPanel" class="panel menu-panel">
        <div class="menu-buttons">
          <button class="btn menu-btn" type="button" data-section="routes" data-i18n="menu.routes">Rutas y precio</button>
          <button class="btn menu-btn" type="button" data-section="add" data-i18n="menu.add">Añadir nuevo contenido</button>
          <button class="btn menu-btn" type="button" data-section="data" data-i18n="menu.data">Datos ya puestos</button>
        </div>
      </section>

      <main class="layout">
        <section class="panel manual-panel hidden" id="manualPanel">
          <h2 data-i18n="manual.title">Ciudades manuales</h2>
          <p data-i18n="manual.subtitle">Añade países y ciudades con coordenadas X/Z para calcular distancias.</p>
          <form id="manualForm" class="manual-grid">
            <label class="field">
              <span data-i18n="manual.country">País</span>
              <input id="manualCountry" type="text" placeholder="España" data-i18n-placeholder="manual.country_placeholder" />
            </label>
            <label class="field">
              <span data-i18n="manual.city">Ciudad</span>
              <input id="manualCity" type="text" placeholder="Madrid" data-i18n-placeholder="manual.city_placeholder" />
            </label>
            <label class="field">
              <span data-i18n="manual.x">X</span>
              <input id="manualX" type="number" placeholder="0" />
            </label>
            <label class="field">
              <span data-i18n="manual.z">Z</span>
              <input id="manualZ" type="number" placeholder="0" />
            </label>
            <button class="btn btn-primary" type="submit" data-i18n="manual.add">Añadir ciudad</button>
          </form>
          <p id="manualMessage" class="auth-message"></p>

          <div class="manual-calc">
            <div class="manual-selects">
              <label class="field">
                <span data-i18n="manual.from_country">País origen</span>
                <select id="fromCountry"></select>
              </label>
              <label class="field">
                <span data-i18n="manual.from_city">Ciudad origen</span>
                <select id="fromCity"></select>
              </label>
              <label class="field">
                <span data-i18n="manual.to_country">País destino</span>
                <select id="toCountry"></select>
              </label>
              <label class="field">
                <span data-i18n="manual.to_city">Ciudad destino</span>
                <select id="toCity"></select>
              </label>
            </div>
            <div class="manual-pricing">
              <label class="field">
                <span data-i18n="manual.price_per_block">Precio por bloque</span>
                <input id="pricePerBlock" type="number" step="0.01" placeholder="0.00" />
              </label>
              <div class="manual-results">
                <div><span data-i18n="manual.distance">Distancia</span>: <b id="distanceResult">0</b></div>
                <div><span data-i18n="manual.cost">Coste</span>: <b id="costResult">0</b></div>
              </div>
            </div>
          </div>
        </section>

        <section id="entryBar" class="panel entry-bar hidden">
          <h2 data-i18n="entry.new_title">Nueva entrada</h2>
          <form id="newEntryForm" class="entry-grid"></form>
        </section>

        <section id="controlsPanel" class="panel controls hidden">
          <div class="controls-row">
            <label class="field">
              <span data-i18n="filters.search">Buscar</span>
              <input id="searchInput" type="text" placeholder="Nombre, trabajo, estado..." data-i18n-placeholder="filters.search_placeholder" />
            </label>
            <label class="field">
              <span data-i18n="filters.status">Filtro Estado</span>
              <select id="statusFilter"><option value="">Todos</option></select>
            </label>
            <label class="field">
              <span data-i18n="filters.payment">Filtro Pago</span>
              <select id="paymentFilter"><option value="">Todos</option></select>
            </label>
          </div>
          <div class="controls-row actions">
            <button id="loadCsvBtn" class="btn" data-i18n="actions.import">Importar archivo</button>
            <input id="csvInput" type="file" accept=".csv,.html,.htm" hidden />
            <button id="downloadBtn" class="btn btn-primary" data-i18n="actions.export">Exportar CSV</button>
            <button id="resetBtn" class="btn" data-i18n="actions.reload">Recargar nube</button>
          </div>
        </section>

        <section class="panel stats hidden" id="stats"></section>

        <section class="panel table-panel hidden" id="dataPanel">
          <div class="table-wrap">
            <table id="dataTable"><thead></thead><tbody></tbody></table>
          </div>
        </section>

        <section id="adminPanel" class="panel hidden">
          <h2 data-i18n="admin.panel_title">Panel Admin</h2>
          <div class="admin-create">
            <input id="newUserInput" type="text" placeholder="nuevo_usuario" data-i18n-placeholder="admin.new_user_placeholder" />
            <input id="newUserPassInput" type="password" placeholder="contraseña" data-i18n-placeholder="admin.new_pass_placeholder" />
            <label><input id="newUserAdminInput" type="checkbox" /> <span data-i18n="admin.admin_label">Admin</span></label>
            <button id="createUserBtn" class="btn" data-i18n="admin.create_user">Crear usuario</button>
          </div>
          <div class="table-wrap">
            <table id="membersTable">
              <thead><tr><th data-i18n="admin.th_user">Usuario</th><th data-i18n="admin.th_role">Rol</th><th data-i18n="admin.th_active">Activo</th><th data-i18n="admin.th_actions">Acciones</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script>
      window.__showFatal = function (message) {
        var authMessage = document.getElementById("authMessage");
        if (authMessage) authMessage.textContent = "Error JS: " + message;
      };
      window.addEventListener("error", function (ev) { window.__showFatal(ev.message || "Error desconocido"); });
      window.addEventListener("unhandledrejection", function (ev) {
        var msg = ev && ev.reason && (ev.reason.message || String(ev.reason));
        window.__showFatal(msg || "Promise rechazada sin detalle");
      });
    </script>
    <script src="./app.js"></script>
  </body>
</html>
